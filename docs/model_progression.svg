<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size:14px; font-weight:500; fill:#1a1a1a; }
  .ts  { font-size:12px; fill:#555; }
  .rnn  { fill:#E1F5EE; stroke:#0F6E56; }
  .lstm { fill:#EEEDFE; stroke:#534AB7; }
  .trans{ fill:#FAECE7; stroke:#993C1D; }
  .gray { fill:#F1EFE8; stroke:#5F5E5A; }
  .arr  { stroke:#999; fill:none; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
</marker>
</defs>

<rect x="40" y="60" width="160" height="56" rx="8" stroke-width="0.5" class="rnn"/>
<text class="th" x="120" y="82" text-anchor="middle" fill="#085041">Vanilla RNN</text>
<text class="ts" x="120" y="100" text-anchor="middle" fill="#0F6E56">simplest recurrent model</text>
<rect x="40" y="140" width="160" height="44" rx="6" stroke-width="0.5" class="rnn"/>
<text class="ts" x="120" y="162" text-anchor="middle" fill="#0F6E56">one hidden state h_t</text>
<rect x="40" y="196" width="160" height="44" rx="6" stroke-width="0.5" class="rnn"/>
<text class="ts" x="120" y="218" text-anchor="middle" fill="#0F6E56">processes one step at a time</text>
<rect x="40" y="252" width="160" height="44" rx="6" stroke-width="0.5" class="rnn"/>
<text class="ts" x="120" y="274" text-anchor="middle" fill="#0F6E56">vanishing gradient problem</text>
<rect x="40" y="308" width="160" height="44" rx="6" stroke-width="0.5" class="rnn"/>
<text class="ts" x="120" y="330" text-anchor="middle" fill="#0F6E56">struggles with long sequences</text>

<line x1="200" y1="88" x2="248" y2="88" class="arr" stroke="#1D9E75" marker-end="url(#arrow)"/>
<text class="ts" x="224" y="80" text-anchor="middle">solves</text>
<text class="ts" x="224" y="100" text-anchor="middle">vanishing grad</text>

<rect x="250" y="60" width="160" height="56" rx="8" stroke-width="0.5" class="lstm"/>
<text class="th" x="330" y="82" text-anchor="middle" fill="#3C3489">LSTM</text>
<text class="ts" x="330" y="100" text-anchor="middle" fill="#534AB7">gated memory cell</text>
<rect x="250" y="140" width="160" height="44" rx="6" stroke-width="0.5" class="lstm"/>
<text class="ts" x="330" y="162" text-anchor="middle" fill="#534AB7">h_t + cell state c_t</text>
<rect x="250" y="196" width="160" height="44" rx="6" stroke-width="0.5" class="lstm"/>
<text class="ts" x="330" y="218" text-anchor="middle" fill="#534AB7">forget / input / output gates</text>
<rect x="250" y="252" width="160" height="44" rx="6" stroke-width="0.5" class="lstm"/>
<text class="ts" x="330" y="274" text-anchor="middle" fill="#534AB7">learns what to remember</text>
<rect x="250" y="308" width="160" height="44" rx="6" stroke-width="0.5" class="lstm"/>
<text class="ts" x="330" y="330" text-anchor="middle" fill="#534AB7">still sequential — slow</text>

<line x1="410" y1="88" x2="458" y2="88" class="arr" stroke="#534AB7" marker-end="url(#arrow)"/>
<text class="ts" x="434" y="80" text-anchor="middle">removes</text>
<text class="ts" x="434" y="100" text-anchor="middle">sequential limit</text>

<rect x="460" y="60" width="180" height="56" rx="8" stroke-width="0.5" class="trans"/>
<text class="th" x="550" y="82" text-anchor="middle" fill="#712B13">Transformer</text>
<text class="ts" x="550" y="100" text-anchor="middle" fill="#993C1D">attention-based, parallel</text>
<rect x="460" y="140" width="180" height="44" rx="6" stroke-width="0.5" class="trans"/>
<text class="ts" x="550" y="162" text-anchor="middle" fill="#993C1D">no hidden state — uses attention</text>
<rect x="460" y="196" width="180" height="44" rx="6" stroke-width="0.5" class="trans"/>
<text class="ts" x="550" y="218" text-anchor="middle" fill="#993C1D">sees whole sequence at once</text>
<rect x="460" y="252" width="180" height="44" rx="6" stroke-width="0.5" class="trans"/>
<text class="ts" x="550" y="274" text-anchor="middle" fill="#993C1D">multi-head attention</text>
<rect x="460" y="308" width="180" height="44" rx="6" stroke-width="0.5" class="trans"/>
<text class="ts" x="550" y="330" text-anchor="middle" fill="#993C1D">foundation of GPT, BERT</text>

<text class="ts" x="120" y="375" text-anchor="middle" fill="#0F6E56">rnn-pytorch</text>
<text class="ts" x="330" y="375" text-anchor="middle" fill="#534AB7">lstm-pytorch</text>
<text class="ts" x="550" y="375" text-anchor="middle" fill="#993C1D">transformer-pytorch</text>
</svg>
