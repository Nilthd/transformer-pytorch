<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size:14px; font-weight:500; }
  .ts  { font-size:12px; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
</marker>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/>
</marker>
</defs>

<rect x="30"  y="100" width="155" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="107" y="121" text-anchor="middle" dominant-baseline="central" fill="#085041">Vanilla RNN</text>
<text class="ts" x="107" y="141" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">simplest recurrent model</text>

<rect x="263" y="100" width="155" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="121" text-anchor="middle" dominant-baseline="central" fill="#3C3489">LSTM</text>
<text class="ts" x="340" y="141" text-anchor="middle" dominant-baseline="central" fill="#534AB7">gated memory cell</text>

<rect x="496" y="100" width="155" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="573" y="121" text-anchor="middle" dominant-baseline="central" fill="#712B13">Transformer</text>
<text class="ts" x="573" y="141" text-anchor="middle" dominant-baseline="central" fill="#993C1D">attention-based, parallel</text>

<path d="M185 128 L185 50 L263 50" stroke="#1D9E75" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="224" y="34" text-anchor="middle" fill="#085041">solves vanishing</text>
<text class="ts" x="224" y="48" text-anchor="middle" fill="#085041">gradient problem</text>

<path d="M418 128 L418 50 L496 50" stroke="#534AB7" stroke-width="1" fill="none" marker-end="url(#arrow2)"/>
<text class="ts" x="457" y="34" text-anchor="middle" fill="#3C3489">removes sequential</text>
<text class="ts" x="457" y="48" text-anchor="middle" fill="#3C3489">processing limit</text>

<rect x="30"  y="180" width="155" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="107" y="199" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">one hidden state h_t</text>
<rect x="30"  y="226" width="155" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="107" y="245" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">one step at a time</text>
<rect x="30"  y="272" width="155" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="107" y="291" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">vanishing gradients</text>
<rect x="30"  y="318" width="155" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="107" y="337" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">struggles long sequences</text>

<rect x="263" y="180" width="155" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="340" y="199" text-anchor="middle" dominant-baseline="central" fill="#534AB7">h_t + cell state c_t</text>
<rect x="263" y="226" width="155" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="340" y="245" text-anchor="middle" dominant-baseline="central" fill="#534AB7">forget/input/output gates</text>
<rect x="263" y="272" width="155" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="340" y="291" text-anchor="middle" dominant-baseline="central" fill="#534AB7">learns what to remember</text>
<rect x="263" y="318" width="155" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="340" y="337" text-anchor="middle" dominant-baseline="central" fill="#534AB7">still sequential — slow</text>

<rect x="496" y="180" width="155" height="38" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="573" y="199" text-anchor="middle" dominant-baseline="central" fill="#993C1D">no hidden state</text>
<rect x="496" y="226" width="155" height="38" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="573" y="245" text-anchor="middle" dominant-baseline="central" fill="#993C1D">sees whole sequence at once</text>
<rect x="496" y="272" width="155" height="38" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="573" y="291" text-anchor="middle" dominant-baseline="central" fill="#993C1D">multi-head attention</text>
<rect x="496" y="318" width="155" height="38" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="573" y="337" text-anchor="middle" dominant-baseline="central" fill="#993C1D">foundation of GPT, BERT</text>

<text class="ts" x="107" y="378" text-anchor="middle" fill="#0F6E56">rnn-pytorch</text>
<text class="ts" x="340" y="378" text-anchor="middle" fill="#534AB7">lstm-pytorch</text>
<text class="ts" x="573" y="378" text-anchor="middle" fill="#993C1D">transformer-pytorch</text>
</svg>
