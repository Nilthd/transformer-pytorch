<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size:14px; font-weight:500; }
  .ts  { font-size:12px; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
</marker>
</defs>

<rect x="215" y="30" width="250" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="44" text-anchor="middle" fill="#2C2C2A">Input sequence</text>
<text class="ts" x="340" y="62" text-anchor="middle" fill="#5F5E5A">raw feature values per timestep</text>

<line x1="340" y1="74" x2="340" y2="104" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<rect x="215" y="106" width="250" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="120" text-anchor="middle" fill="#085041">Input projection</text>
<text class="ts" x="340" y="138" text-anchor="middle" fill="#0F6E56">features → d_model dimensions</text>

<line x1="340" y1="150" x2="340" y2="180" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<rect x="215" y="182" width="250" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="196" text-anchor="middle" fill="#085041">Positional encoding</text>
<text class="ts" x="340" y="214" text-anchor="middle" fill="#0F6E56">sine/cosine position signals</text>

<line x1="340" y1="226" x2="340" y2="256" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<rect x="170" y="258" width="340" height="210" rx="12" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="6 3"/>
<text class="ts" x="184" y="275" fill="#534AB7">Transformer block × N</text>

<rect x="195" y="282" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="302" text-anchor="middle" fill="#3C3489">Multi-head attention</text>
<text class="ts" x="340" y="322" text-anchor="middle" fill="#534AB7">Q, K, V projections · scaled dot-product</text>

<rect x="195" y="350" width="290" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="340" y="368" text-anchor="middle" fill="#444441">Add &amp; LayerNorm (residual connection)</text>

<rect x="195" y="398" width="290" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="412" text-anchor="middle" fill="#3C3489">Feed-forward network</text>
<text class="ts" x="340" y="430" text-anchor="middle" fill="#534AB7">Linear → ReLU → Linear</text>

<rect x="195" y="454" width="290" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="340" y="472" text-anchor="middle" fill="#444441">Add &amp; LayerNorm (residual connection)</text>

<line x1="340" y1="490" x2="340" y2="500" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<rect x="215" y="500" width="250" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="514" text-anchor="middle" fill="#712B13">Average pooling</text>
<text class="ts" x="340" y="532" text-anchor="middle" fill="#993C1D">collapse sequence → one vector</text>

<line x1="340" y1="544" x2="340" y2="560" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="340" y="573" text-anchor="middle" fill="#555">class prediction</text>

<line x1="170" y1="368" x2="130" y2="368" stroke="#aaa" stroke-width="0.5" fill="none"/>
<line x1="130" y1="282" x2="130" y2="490" stroke="#aaa" stroke-width="0.5" fill="none"/>
<line x1="130" y1="490" x2="170" y2="490" stroke="#aaa" stroke-width="0.5" fill="none"/>
<text class="ts" x="50" y="388" text-anchor="middle" fill="#888">residual</text>
<text class="ts" x="50" y="402" text-anchor="middle" fill="#888">skip</text>
</svg>
